name: CI Pipeline — MAGRO

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — Build, Type-Check & Audit
  # ─────────────────────────────────────────────
  backend:
    name: Backend (TypeScript Build & Security Audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript type-check (no emit)
        run: npx tsc --noEmit

      - name: Security audit (high severity only)
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — Build & Audit
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Vite Build & Security Audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:4000/api/v1' }}
          VITE_GOOGLE_AUTH_ENABLED: "false"
          VITE_MOCK_DATA_ENABLED: "false"

      - name: Security audit (high severity only)
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 3: SAST — CodeQL Static Analysis
  # ─────────────────────────────────────────────
  codeql:
    name: SAST (CodeQL Analysis)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "typescript", "javascript" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ─────────────────────────────────────────────
  # JOB 4: Secret Scanning — Gitleaks
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
