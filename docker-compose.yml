version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: magro-postgres
    environment:
      POSTGRES_USER: magro_user
      POSTGRES_PASSWORD: magro_password
      POSTGRES_DB: magro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - magro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magro_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magro-backend
    environment:
      DATABASE_URL: postgresql://magro_user:magro_password@postgres:5432/magro
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: magro-production-secret-key-change-in-production
      CLIENT_ORIGIN: http://localhost:80
      SMS_API_ENABLED: "false"
      SMS_API_KEY: ""
      SMS_API_URL: ""
      SMS_SENDER_ID: MAGRO
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REDIRECT_URI: http://localhost/auth/google/callback
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - magro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: magro-frontend
    environment:
      VITE_API_BASE_URL: http://backend:4000/api/v1
      VITE_MOCK_DATA_ENABLED: "true"
      VITE_SMS_API_ENABLED: "false"
      VITE_SMS_API_KEY: ""
      VITE_SMS_API_URL: ""
      VITE_GOOGLE_AUTH_ENABLED: "false"
      VITE_GOOGLE_CLIENT_ID: ""
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - magro-network

volumes:
  postgres_data:
    driver: local

networks:
  magro-network:
    driver: bridge
